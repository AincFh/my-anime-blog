name: Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint check
      run: npx eslint . --ext .ts,.tsx --max-warnings 0

    - name: Type check
      run: npm run typecheck

    - name: Unit Tests
      run: npm run test:run

    - name: Build check
      run: npm run build
